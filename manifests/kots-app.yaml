---
apiVersion: kots.io/v1beta1
kind: Application
metadata:
  name: Carto
spec:
  title: CARTO
  icon: https://storage.googleapis.com/carto-published-resources-bucket/CARTO-Logo-Marker.png
  allowRollback: false
  supportMinimalRBACPrivileges: true
  statusInformers:
    # TODO: Add ingress, gateway or router service
    - deployment/carto-accounts-www
    - deployment/carto-cdn-invalidator-sub
    - deployment/carto-http-cache
    - deployment/carto-import-api
    - deployment/carto-import-worker
    - deployment/carto-lds-api
    - deployment/carto-maps-api
    - deployment/carto-notifier
    - deployment/carto-router
    - deployment/carto-sql-worker
    - deployment/carto-workspace-api
    - deployment/carto-workspace-subscriber
    - deployment/carto-workspace-www
    - '{{repl if ConfigOptionEquals "externalRedisEnabled" "0" }}deployment/carto-valkey{{repl else}}{{repl end }}'
    - '{{repl if ConfigOptionEquals "aiFeaturesEnabled" "1" }}deployment/carto-ai-api{{repl else}}{{repl end }}'
    - '{{repl if ConfigOptionEquals "aiFeaturesEnabled" "1" }}deployment/carto-aiproxy{{repl else}}{{repl end }}'
    - '{{repl if ConfigOptionEquals "publicEventsApiEnabled" "1" }}deployment/carto-public-events-api{{repl else}}{{repl end }}'
    - '{{repl if ConfigOptionEquals "authApiEnabled" "1" }}deployment/carto-auth-api{{repl else}}{{repl end }}'
    - '{{repl if ConfigOptionEquals "authApiEnabled" "1" }}deployment/carto-accounts-api{{repl else}}{{repl end }}'
    - '{{repl if ConfigOptionEquals "authApiEnabled" "1" }}deployment/carto-accounts-subscriber{{repl else}}{{repl end }}'
    - '{{repl if ConfigOptionEquals "authApiEnabled" "1" }}deployment/carto-pubsub-emulator{{repl else}}{{repl end }}'
  minKotsVersion: 1.117.3
  additionalImages:
    - gcr.io/carto-onprem-artifacts/tenant-requirements-checker:2025.6.10
    - gcr.io/google.com/cloudsdktool/google-cloud-cli:558.0.0-emulators@sha256:ecfd2ecd3c2bcb66a95920f97c6b26247108009f63bc15c7213dc70c78c412c8
---
apiVersion: app.k8s.io/v1beta1
kind: Application
metadata:
  name: Carto
spec:
  descriptor:
    links:
      - description: Open CARTO platform
        url: "https://{{repl ConfigOption `cartoSelfHostedDomain` }}"
