{{- if and (.Values.appConfigValues.authApiEnabled) (not .Values.accountsApi.existingConfigMap) }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ template "carto.accountsApi.fullname" . }}
  namespace: {{ .Release.Namespace | quote }}
  labels: {{- include "common.labels.standard" . | nindent 4 }}
    {{- if .Values.commonLabels }}
    {{- include "common.tplvalues.render" ( dict "value" .Values.commonLabels "context" $ ) | nindent 4 }}
    {{- end }}
    app.kubernetes.io/component: accounts-api
  {{- if .Values.commonAnnotations }}
  annotations: {{- include "common.tplvalues.render" ( dict "value" .Values.commonAnnotations "context" $ ) | nindent 4 }}
  {{- end }}
data:
  ACCOUNTS_PORT: {{ .Values.accountsApi.containerPorts.http | quote }}
  ACCOUNTS_SUBSCRIBER_PORT: {{ .Values.accountsSubscriber.containerPorts.http | quote }}
  ACCOUNTS_LOG_LEVEL: {{ .Values.appConfigValues.logLevel | quote }}
  LOG_LEVEL: {{ .Values.appConfigValues.logLevel | quote }}
  NODE_OPTIONS: {{ template "carto.accountsApi.nodeOptions" . }}
  # accounts-api is self-hosted-disconnected-only: never export traces to the default OTLP localhost endpoint
  CARTO_TRACING_MODE: "none"
  CARTO_SELFHOSTED_VERSION: {{ .Chart.AppVersion | quote }}
  # Internal authentication: switch accounts-api to internal-auth mode (CARTO_INTERNAL_JWKS_URL set)
  # and point it at the in-cluster auth-api. Keeps issuer/audience consistent with the tokens auth-api mints.
  {{- include "carto.internalAuthEnv" . | nindent 2 }}
  CARTO_AUTH_API_URL: "http://{{ include "carto.authApi.fullname" . }}.{{ .Release.Namespace }}.svc.{{ .Values.clusterDomain }}"
  # Accounts database. Reuses the same connection as auth-api (carto.authApi.postgresql.* helpers).
  ACCOUNTS_POSTGRES_HOST: {{ include "carto.authApi.postgresql.host" . | quote }}
  ACCOUNTS_POSTGRES_PORT: {{ include "carto.authApi.postgresql.port" . | quote }}
  ACCOUNTS_POSTGRES_DB: {{ include "carto.authApi.postgresql.databaseName" . | quote }}
  ACCOUNTS_POSTGRES_USER: {{ include "carto.authApi.postgresql.user" . | quote }}
  ACCOUNTS_POSTGRES_SSL_ENABLED: {{ include "carto.authApi.postgresql.sslEnabled" . | quote }}
  {{- if .Values.authApi.accountsPostgresql.host }}
  {{- if and .Values.authApi.accountsPostgresql.sslEnabled .Values.authApi.accountsPostgresql.sslCA }}
  ACCOUNTS_POSTGRES_SSL_CA: {{ include "carto.authApi.postgresql.configMapMountAbsolutePath" . }}
  {{- end }}
  {{- else }}
  {{- if and .Values.externalPostgresql.sslEnabled .Values.externalPostgresql.sslCA }}
  ACCOUNTS_POSTGRES_SSL_CA: {{ include "carto.postgresql.configMapMountAbsolutePath" . }}
  {{- end }}
  {{- end }}
  # PubSub. In disconnected mode the in-cluster emulator replaces Google Cloud PubSub.
  PUBSUB_MODE: "pull"
  PUBSUB_PROJECT_ID: {{ .Values.cartoConfigValues.selfHostedGcpProjectId | quote }}
  PUBSUB_USE_REST_API: {{ .Values.cartoConfigValues.usePubSubRestApi | quote }}
  {{- include "carto.disconnectedPubsubEnv" . | nindent 2 }}
  PUBSUB_COMMON_ACCOUNTS_TOPIC: "projects/{{ .Values.cartoConfigValues.selfHostedGcpProjectId }}/topics/common-accounts"
  PUBSUB_COMMON_ACCOUNTS_SUBSCRIPTION: "projects/{{ .Values.cartoConfigValues.selfHostedGcpProjectId }}/subscriptions/common-accounts-sub"
  PUBSUB_DATA_UPDATES_ACCOUNTS_TOPIC: "projects/{{ .Values.cartoConfigValues.selfHostedGcpProjectId }}/topics/data-updates"
  PUBSUB_DATA_UPDATES_ACCOUNTS_SUBSCRIPTION: "projects/{{ .Values.cartoConfigValues.selfHostedGcpProjectId }}/subscriptions/data-updates-accounts-sub-0000"
  PUBSUB_DATA_UPDATES_TOPICS_TEMPLATE: "projects/{project_id}/topics/data-updates"
  # Cloud-only integrations unreachable in disconnected internal mode. These settings are mandatory at
  # boot but back features (billing, email, partner connect, activity exports, backoffice) that are not
  # exercised in a disconnected deployment; placeholder values until they are gated upstream.
  ACCOUNTS_HONEYCOMB_DATASET: "disabled"
  ACCOUNTS_HONEYCOMB_API_KEY: "disabled"
  ACCOUNTS_SENDGRID_API_KEY: "disabled"
  ACCOUNTS_PAYMENTS_RECURLY_API_KEY: "disabled"
  ACCOUNTS_PAYMENTS_RECURLY_SUBDOMAIN: "disabled"
  ACCOUNTS_PAYMENTS_RECURLY_WEBHOOKS_AUTH_USER: "disabled"
  ACCOUNTS_PAYMENTS_RECURLY_WEBHOOKS_AUTH_PASSWORD: "disabled"
  ACCOUNTS_CARTO_DATAWAREHOUSE_BILLING_ACCOUNT_NAME: "disabled"
  ACCOUNTS_CARTO_DATAWAREHOUSE_ENVIRONMENT: "disabled"
  ACCOUNTS_CARTO_DATAWAREHOUSE_FOLDER_ID: "disabled"
  ACCOUNTS_CARTO_DATAWAREHOUSE_CUSTOMER_DATA: "false"
  ACCOUNTS_PARTNER_CONNECT_SNOWFLAKE_PARTNER_ID: "disabled"
  ACCOUNTS_PARTNER_CONNECT_SNOWFLAKE_PARTNER_SECRET: "disabled"
  BOBSLED_EXPORT_STORAGE_BUCKET: "disabled"
  BOBSLED_SOURCE_ID: "disabled"
  BOBSLED_ENVIRONMENT_NAME: "disabled"
  BOBSLED_CLIENT_ID: "disabled"
  BOBSLED_ACCOUNT_EMAIL: "disabled"
  BOBSLED_ACCOUNT_SECRET: "disabled"
  ACCOUNTS_BACKOFFICE_AUTH_USER: "disabled"
  ACCOUNTS_BACKOFFICE_AUTH_PASSWORD: "disabled"
  ACCOUNTS_ACTIVITY_DATA_BUCKET_NAME: "disabled"
  QUOTA_NOTIFICATIONS_ENABLED: "false"
  {{- if .Values.externalProxy.enabled }}
  HTTP_PROXY: {{ include "carto.proxy.computedConnectionString" . | quote }}
  http_proxy: {{ include "carto.proxy.computedConnectionString" . | quote }}
  HTTPS_PROXY: {{ include "carto.proxy.computedConnectionString" . | quote }}
  https_proxy: {{ include "carto.proxy.computedConnectionString" . | quote }}
  {{- if gt (len .Values.externalProxy.excludedDomains) 0 }}
  NO_PROXY: {{ join "," .Values.externalProxy.excludedDomains | quote }}
  no_proxy: {{ join "," .Values.externalProxy.excludedDomains | quote }}
  {{- end }}
  {{- if .Values.externalProxy.sslCA }}
  NODE_EXTRA_CA_CERTS: {{ include "carto.proxy.configMapMountAbsolutePath" . | quote }}
  {{- end }}
  NODE_TLS_REJECT_UNAUTHORIZED: {{ ternary "1" "0" .Values.externalProxy.sslRejectUnauthorized | quote }}
  {{- end }}
{{- end }}
