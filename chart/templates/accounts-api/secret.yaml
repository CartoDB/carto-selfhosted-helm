{{- if and ((include "carto.disconnected.enabled" .)) (not .Values.cartoConfigValues.onlyRunRouter) }}
{{ $secretContent := include "carto._utils.generateSecretObjects" (dict "vars" (list
  "CARTO_INTERNAL_SERVICE_TOKEN"
  "ENCRYPTION_SECRET_KEY"
 ) "context" $ )}}
{{- $accountsPostgresPassword := and .Values.authApi.accountsPostgresql.password (not .Values.authApi.accountsPostgresql.existingSecret.name) -}}
{{- if or $secretContent $accountsPostgresPassword }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ template "carto.accountsApi.secretName" . }}
  labels: {{- include "common.labels.standard" . | nindent 4 }}
    {{- if .Values.commonLabels }}
    {{- include "common.tplvalues.render" ( dict "value" .Values.commonLabels "context" $ ) | nindent 4 }}
    {{- end }}
    app.kubernetes.io/component: accounts-api
  {{- if .Values.commonAnnotations }}
  annotations: {{- include "common.tplvalues.render" ( dict "value" .Values.commonAnnotations "context" $ ) | nindent 4 }}
  {{- end }}
data:
  {{- if $secretContent }}
  {{ $secretContent | nindent 2 }}
  {{- end }}
  {{- if $accountsPostgresPassword }}
  ACCOUNTS_POSTGRES_PASSWORD: {{ .Values.authApi.accountsPostgresql.password | b64enc | quote }}  # authApi.accountsPostgresql.password
  {{- end }}
{{- end }}
{{- end }}
