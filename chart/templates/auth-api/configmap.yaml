{{- if and (.Values.appConfigValues.authApiEnabled) (not .Values.authApi.existingConfigMap) }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ template "carto.authApi.fullname" . }}
  namespace: {{ .Release.Namespace | quote }}
  labels: {{- include "common.labels.standard" . | nindent 4 }}
    {{- if .Values.commonLabels }}
    {{- include "common.tplvalues.render" ( dict "value" .Values.commonLabels "context" $ ) | nindent 4 }}
    {{- end }}
    app.kubernetes.io/component: auth-api
  {{- if .Values.commonAnnotations }}
  annotations: {{- include "common.tplvalues.render" ( dict "value" .Values.commonAnnotations "context" $ ) | nindent 4 }}
  {{- end }}
data:
  AUTH_API_PORT: {{ .Values.authApi.containerPorts.http | quote }}
  CARTO_AUTH_PROTOCOL: {{ .Values.authApi.protocol | quote }}
  CARTO_INTERNAL_ISSUER: {{ include "carto.authApi.issuer" . | quote }}
  CARTO_AUTH_AUDIENCE: {{ .Values.authApi.audience | quote }}
  CARTO_AUTH_NAMESPACE: "http://app.carto.com"
  CARTO_AUTH_PUBLIC_BASE_URL: {{ include "carto.authApi.publicBaseUrl" . | quote }}
  CARTO_AUTH_ALLOWED_ORIGINS: {{ join "," .Values.authApi.allowedOrigins | quote }}
  CARTO_ORG_ID: {{ .Values.authApi.orgId | quote }}
  CARTO_ACCOUNTS_API_URL: {{ .Values.authApi.accountsApiUrl | quote }}
  {{- if eq .Values.authApi.protocol "oidc" }}
  CARTO_OIDC_ISSUER_URL: {{ .Values.authApi.oidc.issuerUrl | quote }}
  CARTO_OIDC_CLIENT_ID: {{ .Values.authApi.oidc.clientId | quote }}
  CARTO_OIDC_CALLBACK_URL: "{{ include "carto.authApi.publicBaseUrl" . }}/oidc/callback"
  {{- if .Values.authApi.oidc.emailKey }}
  CARTO_OIDC_EMAIL_KEY: {{ .Values.authApi.oidc.emailKey | quote }}
  {{- end }}
  {{- if .Values.authApi.oidc.groupsKey }}
  CARTO_OIDC_GROUPS_KEY: {{ .Values.authApi.oidc.groupsKey | quote }}
  {{- end }}
  {{- end }}
  {{- if eq .Values.authApi.protocol "saml" }}
  {{- if trim .Values.authApi.saml.metadataXml }}
  CARTO_SAML_IDP_METADATA: {{ trim .Values.authApi.saml.metadataXml | quote }}
  {{- else }}
  CARTO_SAML_IDP_METADATA: {{ .Values.authApi.saml.metadataUrl | quote }}
  {{- end }}
  CARTO_SAML_CALLBACK_URL: "{{ include "carto.authApi.publicBaseUrl" . }}/saml/callback"
  {{- if .Values.authApi.saml.emailAttribute }}
  CARTO_SAML_EMAIL_ATTRIBUTE: {{ .Values.authApi.saml.emailAttribute | quote }}
  {{- end }}
  {{- if .Values.authApi.saml.groupsAttribute }}
  CARTO_SAML_GROUPS_ATTRIBUTE: {{ .Values.authApi.saml.groupsAttribute | quote }}
  {{- end }}
  {{- end }}
  {{- if .Values.authApi.accessTokenTtlSeconds }}
  CARTO_ACCESS_TOKEN_TTL_SECONDS: {{ .Values.authApi.accessTokenTtlSeconds | quote }}
  {{- end }}
  {{- if .Values.authApi.refreshTokenTtlSeconds }}
  CARTO_REFRESH_TOKEN_TTL_SECONDS: {{ .Values.authApi.refreshTokenTtlSeconds | quote }}
  {{- end }}
  # auth-api is self-hosted-only: never export traces to the default OTLP localhost endpoint
  CARTO_TRACING_MODE: "none"
  CARTO_SELFHOSTED_VERSION: {{ .Chart.AppVersion | quote }}
  {{- if .Values.externalProxy.enabled }}
  HTTP_PROXY: {{ include "carto.proxy.computedConnectionString" . | quote }}
  http_proxy: {{ include "carto.proxy.computedConnectionString" . | quote }}
  HTTPS_PROXY: {{ include "carto.proxy.computedConnectionString" . | quote }}
  https_proxy: {{ include "carto.proxy.computedConnectionString" . | quote }}
  {{- if gt (len .Values.externalProxy.excludedDomains) 0 }}
  NO_PROXY: {{ join "," .Values.externalProxy.excludedDomains | quote }}
  no_proxy: {{ join "," .Values.externalProxy.excludedDomains | quote }}
  {{- end }}
  {{- if .Values.externalProxy.sslCA }}
  NODE_EXTRA_CA_CERTS: {{ include "carto.proxy.configMapMountAbsolutePath" . | quote }}
  {{- end }}
  NODE_TLS_REJECT_UNAUTHORIZED: {{ ternary "1" "0" .Values.externalProxy.sslRejectUnauthorized | quote }}
  {{- end }}
  LOG_LEVEL: {{ .Values.appConfigValues.logLevel | quote }}
  NODE_OPTIONS: {{ template "carto.authApi.nodeOptions" . }}
  REDIS_HOST: {{ include "carto.redis.host" . | quote }}
  REDIS_PORT: {{ include "carto.redis.port" . | quote }}
  REDIS_TLS_ENABLED: {{ .Values.externalRedis.tlsEnabled | quote }}
  {{- if and .Values.externalRedis.tlsEnabled .Values.externalRedis.tlsCA }}
  REDIS_TLS_CA: {{ include "carto.redis.configMapMountAbsolutePath" . }}
  {{- end }}
  ACCOUNTS_POSTGRES_HOST: {{ include "carto.authApi.postgresql.host" . | quote }}
  ACCOUNTS_POSTGRES_PORT: {{ include "carto.authApi.postgresql.port" . | quote }}
  ACCOUNTS_POSTGRES_DB: {{ include "carto.authApi.postgresql.databaseName" . | quote }}
  ACCOUNTS_POSTGRES_USER: {{ include "carto.authApi.postgresql.user" . | quote }}
  ACCOUNTS_POSTGRES_SSL_ENABLED: {{ include "carto.authApi.postgresql.sslEnabled" . | quote }}
  {{- if .Values.authApi.accountsPostgresql.host }}
  {{- if and .Values.authApi.accountsPostgresql.sslEnabled .Values.authApi.accountsPostgresql.sslCA }}
  ACCOUNTS_POSTGRES_SSL_CA: {{ include "carto.authApi.postgresql.configMapMountAbsolutePath" . }}
  {{- end }}
  {{- else }}
  {{- if and .Values.externalPostgresql.sslEnabled .Values.externalPostgresql.sslCA }}
  ACCOUNTS_POSTGRES_SSL_CA: {{ include "carto.postgresql.configMapMountAbsolutePath" . }}
  {{- end }}
  {{- end }}
{{- end }}
