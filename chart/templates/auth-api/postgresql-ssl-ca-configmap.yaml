{{- if and ((include "carto.disconnected.enabled" .)) (.Values.authApi.accountsPostgresql.host) (.Values.authApi.accountsPostgresql.sslEnabled) (.Values.authApi.accountsPostgresql.sslCA) }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "carto.authApi.postgresql.configMapName" . }}
  labels: {{- include "common.labels.standard" . | nindent 4 }}
    {{- if .Values.commonLabels }}
    {{- include "common.tplvalues.render" ( dict "value" .Values.commonLabels "context" $ ) | nindent 4 }}
    {{- end }}
    app.kubernetes.io/component: auth-api
  namespace: {{ .Release.Namespace | quote }}
  {{- if .Values.commonAnnotations }}
  annotations: {{- include "common.tplvalues.render" ( dict "value" .Values.commonAnnotations "context" $ ) | nindent 4 }}
  {{- end }}
data:
  {{ include "carto.postgresql.configMapMountFilename" . }}: {{ .Values.authApi.accountsPostgresql.sslCA | quote }}
{{- end }}
