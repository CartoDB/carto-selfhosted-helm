{{- if and (.Values.appConfigValues.authApiEnabled) (not .Values.cartoConfigValues.onlyRunRouter) }}
apiVersion: v1
kind: Service
metadata:
  name: {{ template "carto.pubsubEmulator.fullname" . }}
  namespace: {{ .Release.Namespace | quote }}
  labels: {{- include "common.labels.standard" . | nindent 4 }}
    app.kubernetes.io/component: pubsub-emulator
    {{- if .Values.commonLabels }}
    {{- include "common.tplvalues.render" ( dict "value" .Values.commonLabels "context" $ ) | nindent 4 }}
    {{- end }}
  annotations:
    {{- if .Values.commonAnnotations }}
    {{- include "common.tplvalues.render" ( dict "value" .Values.commonAnnotations "context" $ ) | nindent 4 }}
    {{- end }}
    {{- if .Values.pubsubEmulator.service.annotations }}
    {{- include "common.tplvalues.render" (dict "value" .Values.pubsubEmulator.service.annotations "context" $) | nindent 4 }}
    {{- end }}
spec:
  type: {{ .Values.pubsubEmulator.service.type }}
  ports:
    - port: {{ .Values.pubsubEmulator.service.ports.http }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "common.labels.matchLabels" . | nindent 4 }}
    app.kubernetes.io/component: pubsub-emulator
{{- end }}
