{{- /*
  S3 credentials for the bundled test-bed. Auto-generated random keys when
  internalObjectStorage.auth.* are empty, reused across upgrades via `lookup`
  (so they stay stable and consumers don't break), and overridable by setting
  auth.* explicitly. Nothing static is committed. The bundled image entrypoint
  renders these into SeaweedFS's s3.config.json at startup. Skipped when an
  existingSecret is provided.
*/ -}}
{{- if and .Values.internalObjectStorage.enabled (not .Values.internalObjectStorage.existingSecret) }}
{{- $secretName := include "carto.seaweedfs.fullname" . -}}
{{- $existing := (lookup "v1" "Secret" .Release.Namespace $secretName) -}}
{{- $accessKey := .Values.internalObjectStorage.auth.accessKey -}}
{{- $secretKey := .Values.internalObjectStorage.auth.secretKey -}}
{{- if and $existing $existing.data -}}
{{-   if not $accessKey }}{{- $accessKey = (index $existing.data "access-key" | b64dec) -}}{{- end -}}
{{-   if not $secretKey }}{{- $secretKey = (index $existing.data "secret-key" | b64dec) -}}{{- end -}}
{{- end -}}
{{- $accessKey = $accessKey | default (randAlphaNum 20) -}}
{{- $secretKey = $secretKey | default (randAlphaNum 40) -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "common.labels.standard" . | nindent 4 }}
    app.kubernetes.io/component: seaweedfs
    {{- if .Values.commonLabels }}
    {{- include "common.tplvalues.render" ( dict "value" .Values.commonLabels "context" $ ) | nindent 4 }}
    {{- end }}
  {{- if .Values.commonAnnotations }}
  annotations:
    {{- include "common.tplvalues.render" ( dict "value" .Values.commonAnnotations "context" $ ) | nindent 4 }}
  {{- end }}
type: Opaque
data:
  access-key: {{ $accessKey | b64enc | quote }}
  secret-key: {{ $secretKey | b64enc | quote }}
{{- end }}
