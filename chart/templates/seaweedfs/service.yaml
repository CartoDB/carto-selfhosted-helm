{{- if .Values.internalObjectStorage.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ template "carto.seaweedfs.fullname" . }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "common.labels.standard" . | nindent 4 }}
    app.kubernetes.io/component: seaweedfs
    {{- if .Values.commonLabels }}
    {{- include "common.tplvalues.render" (dict "value" .Values.commonLabels "context" $) | nindent 4 }}
    {{- end }}
  {{- if or .Values.commonAnnotations .Values.internalObjectStorage.service.annotations }}
  annotations:
    {{- if .Values.commonAnnotations }}
    {{- include "common.tplvalues.render" (dict "value" .Values.commonAnnotations "context" $) | nindent 4 }}
    {{- end }}
    {{- if .Values.internalObjectStorage.service.annotations }}
    {{- include "common.tplvalues.render" (dict "value" .Values.internalObjectStorage.service.annotations "context" $) | nindent 4 }}
    {{- end }}
  {{- end }}
spec:
  type: {{ .Values.internalObjectStorage.service.type }}
  ports:
    - port: {{ .Values.internalObjectStorage.service.ports.s3 }}
      targetPort: s3
      protocol: TCP
      name: s3
  selector:
    {{- include "common.labels.matchLabels" . | nindent 4 }}
    app.kubernetes.io/component: seaweedfs
{{- end }}
