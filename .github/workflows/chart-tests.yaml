name: Chart tests

# Behavioural checks against the rendered chart. Each step under
# `chart-tests` is an independent test. Add new tests as additional steps
# here rather than creating per-test workflows — that way the PR shows one
# `chart-tests` status check, helm + krew install costs are amortised
# across tests, and triggers stay scoped to chart changes.
#
# Tests today:
#   - support-bundle redactor verification
#     (chart/tests/test-redactors.sh)
#
# Candidates to add next (open follow-ups, not in scope for this PR):
#   - validators: render with intentionally-broken values and assert each
#     carto.validateValues.* helper fires its expected message
#   - KOTS render: scripts/test-kots-config.sh all
#   - schema lint of the rendered preflight + support-bundle Secrets
#
# Local equivalent of this workflow:
#   helm dependency update -C chart
#   bash chart/tests/test-redactors.sh

on:
  pull_request:
    paths:
      - chart/**
      - .github/actions/chart-setup/**
      - .github/workflows/chart-tests.yaml

jobs:
  chart-tests:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/chart-setup
        # Composite installs helm + troubleshoot CLIs and runs
        # `helm dependency update`. Future tests inherit this setup for
        # free — they only add their own step below.

      - name: Verify support-bundle redactors
        run: bash chart/tests/test-redactors.sh
